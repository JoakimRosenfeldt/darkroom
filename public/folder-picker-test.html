<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Folder picker test</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
      }
      pre {
        background: #111;
        color: #0f0;
        padding: 1rem;
        border-radius: 8px;
        white-space: pre-wrap;
      }
    </style>
    <script src="/picker-bridge.js"></script>
  </head>
  <body>
    <h1>Folder picker test</h1>
    <p>
      Isolated test outside React. Click the button, pick a folder, click Open.
    </p>
    <button id="pick" type="button">Pick folder (bridge)</button>
    <button id="pick-native" type="button">Pick folder (native)</button>
    <pre id="log"></pre>
    <script>
      const logEl = document.getElementById("log");
      function log(message) {
        const line = `[${new Date().toISOString()}] ${message}`;
        console.log(line);
        logEl.textContent += line + "\n";
      }

      log("embedded=" + (window.self !== window.top));
      log(
        "native=" +
          (window.DarkroomPickerBridge
            ? window.DarkroomPickerBridge.isNativePicker()
            : "no bridge"),
      );

      document.getElementById("pick").onclick = function () {
        if (!window.DarkroomPickerBridge) {
          log("bridge missing");
          return;
        }
        log("opening via bridge…");
        window.DarkroomPickerBridge.open("test")
          .then((handle) => log("bridge success: " + handle.name))
          .catch((error) => log("bridge error: " + error.message))
          .finally(() => log("bridge settled"));
      };

      document.getElementById("pick-native").onclick = function () {
        if (!("showDirectoryPicker" in window)) {
          log("showDirectoryPicker not supported");
          return;
        }
        log("opening native…");
        window
          .showDirectoryPicker({ mode: "read", id: "darkroom-library" })
          .then((handle) => log("native success: " + handle.name))
          .catch((error) => log("native error: " + error.name + ": " + error.message))
          .finally(() => log("native settled"));
      };
    </script>
  </body>
</html>
